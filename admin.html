<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Quản trị hồ sơ xin lỗi</title><link rel="stylesheet" href="assets/css/admin.css"></head><body>
<main class="admin-shell"><section id="login-panel" class="panel"><span class="tag">KHU VỰC QUẢN TRỊ</span><h1>Đăng nhập</h1><p>Chỉ tài khoản quản trị được cấu hình trong Supabase mới có quyền truy cập.</p><form id="login-form"><label>Email<input id="email" type="email" autocomplete="username" required></label><label>Mật khẩu<input id="password" type="password" autocomplete="current-password" required></label><button type="submit">Đăng nhập</button></form><p id="login-message" role="alert"></p></section>
<section id="dashboard" hidden><header><div><span class="tag">BỘ PHẬN HỒ SƠ</span><h1>Quản lý hồ sơ công khai</h1></div><div class="header-actions"><a href="./" target="_blank" rel="noopener">Mở website công khai ↗</a><button id="logout" class="secondary">Đăng xuất</button></div></header><p id="admin-message" role="status"></p><div id="case-list" class="case-list" aria-live="polite"></div></section></main>
<dialog id="confirm"><form method="dialog"><h2>Xác nhận đổi hồ sơ?</h2><p id="confirm-text"></p><div><button value="cancel" class="secondary">Hủy</button><button id="confirm-change" value="default">Xác nhận công khai</button></div></form></dialog>
<script src="assets/js/config.js"></script><script type="module" src="assets/js/admin.js"></script></body></html>
